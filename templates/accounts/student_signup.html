{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="card" style="width: 100%; max-width: 480px;">
        <h2 style="text-align: center; color: var(--primary-color);">Sign Up</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Create your student account to place print orders.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" class="form-control" placeholder="e.g. Alex Johnson" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="roll_number">Roll Number</label>
                <input type="text" id="roll_number" name="roll_number" class="form-control" placeholder="e.g. CS2024001" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email (optional)</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="e.g. student@college.edu">
            </div>

            <div class="form-group">
                <label class="form-label" for="phone_number">Phone Number (optional)</label>
                <input type="text" id="phone_number" name="phone_number" class="form-control" placeholder="e.g. 9876543210">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Minimum 8 characters" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Re-enter password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>

        <p style="text-align: center; margin-top: 1rem; color: var(--text-secondary);">
            Already have an account?
            <a href="{% url 'student_login' %}" style="color: var(--primary-color);">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
