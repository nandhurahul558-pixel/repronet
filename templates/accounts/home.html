{% extends 'base.html' %}

{% block title %}Home - Repro Portal{% endblock %}

{% block content %}
<div class="home-container">
    <div class="hero-section">
        <h1>Welcome to Repro Portal</h1>
        <p>Manage your reproduction orders and payments with ease</p>
    </div>

    <div class="auth-buttons">
        <a href="{% url 'student_login' %}" class="btn btn-primary">Login</a>
        <a href="{% url 'admin_login' %}" class="btn btn-secondary">Admin Login</a>
        <a href="{% url 'student_signup' %}" class="btn btn-success">Sign Up</a>
    </div>
</div>

<style>
    .home-container {
        text-align: center;
        padding: 60px 20px;
    }
    
    .hero-section {
        margin-bottom: 40px;
    }
    
    .hero-section h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
        color: #333;
    }
    
    .hero-section p {
        font-size: 1.2em;
        color: #666;
    }
    
    .auth-buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }
    
    .btn {
        padding: 12px 30px;
        text-decoration: none;
        border-radius: 5px;
        font-size: 1em;
        transition: all 0.3s ease;
        display: inline-block;
    }
    
    .btn-primary {
        background-color: #007bff;
        color: white;
    }
    
    .btn-primary:hover {
        background-color: #0056b3;
    }
    
    .btn-secondary {
        background-color: #6c757d;
        color: white;
    }
    
    .btn-secondary:hover {
        background-color: #545b62;
    }
    
    .btn-success {
        background-color: #28a745;
        color: white;
    }
    
    .btn-success:hover {
        background-color: #218838;
    }
</style>
{% endblock %}
