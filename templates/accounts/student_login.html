{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="card" style="width: 100%; max-width: 400px;">
        <h2 style="text-align: center; color: var(--primary-color);">Student Login</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Welcome to Digital Repro Portal</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="roll_number">Roll Number</label>
                <input type="text" id="roll_number" name="roll_number" class="form-control" placeholder="e.g. CS2024001" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>

        <p style="text-align: center; margin-top: 1rem; color: var(--text-secondary);">
            New student?
            <a href="{% url 'student_signup' %}" style="color: var(--primary-color);">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
