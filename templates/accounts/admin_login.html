{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="card" style="width: 100%; max-width: 400px; border-top: 4px solid var(--danger-color);">
        <h2 style="text-align: center; color: var(--danger-color);">Admin Access</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Restricted to staff only</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="admin" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Authenticate as Admin</button>
        </form>
    </div>
</div>
{% endblock %}
